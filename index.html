/* ===== BRAND COLOR ===== */
:root{
  --maroon:#750320f6;
  --brown:#7c0309;
}

/* ===== BODY ===== */
body{
  margin:0;
  font-family:Poppins,Arial,sans-serif;
  min-height:100vh;

  display:flex;
  justify-content:center;

  overflow-x:hidden;
  animation:pageFade 1s ease;
}

@keyframes pageFade{
  from{opacity:0;}
  to{opacity:1;}
}

/* ===== BACKGROUND ===== */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
  linear-gradient(rgb(146,2,38),#4c0513fa),
  url("fix.PNG");
  background-size:cover;
  background-position:center;
  filter:blur(6px);
  transform:scale(1.1);
  z-index:-1;
}

/* ===== CONTAINER ===== */
.container{
  width:100%;
  max-width:420px;
  padding:25px;
  text-align:center;
  margin:auto;
}

/* ===== LOGO PERFECT CENTER ===== */
.logo{
  width:200px;
  height:200px;
  margin:40px auto 25px;

  border-radius:50%;
  overflow:hidden;
  background:#fff;

  display:flex;
  justify-content:center;
  align-items:center;

  box-shadow:
    0 15px 40px rgba(0,0,0,.4),
    0 0 25px rgba(255,120,150,.25);

  animation:float 4s ease-in-out infinite;
}

.logo img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

/* FLOAT */
@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
}

/* ===== TEXT ===== */
h1{
  color:white;
  letter-spacing:2px;
  margin:10px 0;
}

p{
  color:#f1e4d8;
  font-size:14px;
}

.online{
  color:#9effc4;
  font-size:13px;
  margin-top:-5px;
}

/* ===== CARD ===== */
.card{
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,0.25);

  padding:18px;
  border-radius:25px;
  margin:15px 0;

  display:flex;
  justify-content:space-between;
  align-items:center;
  text-decoration:none;
  color:white;

  box-shadow:0 10px 30px rgba(0,0,0,.35);
  transition:.4s;

  opacity:0;
  transform:translateY(30px);
  animation:fadeUp .8s forwards;
}

.card:nth-of-type(1){animation-delay:.2s;}
.card:nth-of-type(2){animation-delay:.4s;}
.card:nth-of-type(3){animation-delay:.6s;}
.card:nth-of-type(4){animation-delay:.8s;}
.card:nth-of-type(5){animation-delay:1s;}
.card:nth-of-type(6){animation-delay:1.2s;}
.card:nth-of-type(7){animation-delay:1.4s;}
.card:nth-of-type(8){animation-delay:1.6s;}

.card:hover{
  transform:translateY(-7px) scale(1.04);
  background:linear-gradient(135deg,var(--maroon),var(--brown));
  box-shadow:
    0 25px 55px rgba(144,0,36,.6),
    0 0 25px rgba(216, 58, 93, 0.635);
}

.card:active{
  transform:scale(.96);
}

.left{
  display:flex;
  align-items:center;
  gap:12px;
}

.left i{
  color:#ffd7c2;
  font-size:30px;
}

/* ANIMATION */
@keyframes fadeUp{
  to{
    opacity:1;
    transform:translateY(0);
  }
}

</style>
